name: Verify Harness Repo

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  workspace-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile tools
        run: python -m py_compile tools/*.py

      - name: Run workspace-only verifier
        run: python tools/codex_harness_verify.py --workspace-only --markdown-output /tmp/harness-verification-report.md --json-output /tmp/harness-verification-report.json
